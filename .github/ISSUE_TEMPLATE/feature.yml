name: Feature
description: New feature for a kiosk module
title: "[Feature] "
labels: ["feature"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - USB Submission
        - Wi-Fi Transfer (Captive Portal)
        - Email Pipeline
        - Scanning
        - Photocopying
        - Payment Handler
        - Printer Thread
        - Session Mgmt (OTP/QR)
        - Admin Dashboard
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be built and why
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Checklist of done conditions
      placeholder: |
        - [ ] 
        - [ ] 
  - type: textarea
    id: notes
    attributes:
      label: Technical Notes
      description: Dependencies, edge cases, hardware constraints
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [High, Medium, Low]
    validations:
      required: true